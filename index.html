<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Local Archive Viewer</title>
    <style>
        :root {
            --wa-bg: #efeae2;
            --wa-header: #008069;
            --wa-bubble-in: #ffffff;
            --wa-bubble-out: #d9fdd3;
            --wa-text-main: #111b21;
            --wa-text-meta: #667781;
            --wa-author-color: #53bdeb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--wa-text-main);
        }

        .setup-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .setup-container h2 { margin-bottom: 10px; color: var(--wa-header); }
        .setup-container p { font-size: 0.9rem; color: var(--wa-text-meta); margin-bottom: 20px; }

        .file-label {
            display: inline-block;
            background-color: var(--wa-header);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        #file-input { display: none; }
        #status { margin-top: 15px; font-size: 0.85rem; color: var(--wa-text-meta); }

        .app-shell {
            display: none;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
            background-color: var(--wa-bg);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            flex-direction: column;
        }

        .chat-header {
            background-color: var(--wa-header);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #e9edef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #54656f;
        }

        .chat-info { flex: 1; }
        .chat-title { font-size: 1rem; font-weight: 600; }
        .chat-subtitle { font-size: 0.75rem; opacity: 0.85; }

        #user-selector {
            padding: 4px 8px;
            border-radius: 6px;
            border: none;
            font-size: 0.8rem;
            background-color: rgba(255,255,255,0.2);
            color: white;
            outline: none;
            cursor: pointer;
            max-width: 120px;
        }
        
        #user-selector option { color: black; }

        .chat-body {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-thumb { background-color: rgba(11, 20, 26, 0.2); border-radius: 3px; }

        .system-badge {
            align-self: center;
            background-color: rgba(255, 255, 255, 0.92);
            color: #54656f;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: 0 1px 0.5px rgba(11,20,26,0.13);
            margin: 8px 0;
        }

        .msg-container {
            max-width: 80%;
            padding: 6px 9px 8px 9px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
            box-shadow: 0 1px 0.5px rgba(11,20,26,0.13);
            display: flex;
            flex-direction: column;
            word-break: break-word;
        }

        .msg-incoming { align-self: flex-start; background-color: var(--wa-bubble-in); border-top-left-radius: 0; }
        .msg-outgoing { align-self: flex-end; background-color: var(--wa-bubble-out); border-top-right-radius: 0; }

        .msg-author { font-weight: 600; font-size: 0.8rem; color: var(--wa-author-color); margin-bottom: 3px; }
        .msg-outgoing .msg-author { display: none; }
        .msg-text { color: var(--wa-text-main); }
        .msg-meta { font-size: 0.65rem; color: var(--wa-text-meta); align-self: flex-end; margin-top: 4px; margin-left: 20px; margin-bottom: -4px; }
    </style>
</head>
<body>

    <div class="setup-container" id="setup-view">
      <h2>WhatsApp Viewer</h2>
      <p>Select your <code>_chat.txt</code> AND your media files at the same time.</p>
      <label for="file-input" class="file-label">Choose Files</label>
      <input type="file" id="file-input" multiple>
      <div id="status" style="margin-top: 15px; font-size: 0.85rem;">Ready for import</div>
    </div>

    <div class="app-shell" id="app-view">
        <div class="chat-header">
            <div class="avatar" id="header-avatar">WA</div>
            <div class="chat-info">
                <div class="chat-title" id="header-title">WhatsApp Archive</div>
                <div class="chat-subtitle" id="header-count">0 messages loaded</div>
            </div>
            <select id="user-selector" title="Select 'Me'"></select>
        </div>
        <div class="chat-body" id="chat-body"></div>
    </div>

    <script>
        const chatWorker = new Worker('worker.js');
        const setupView = document.getElementById('setup-view');
        const appView = document.getElementById('app-view');
        const statusDiv = document.getElementById('status');
        const chatBody = document.getElementById('chat-body');
        const headerTitle = document.getElementById('header-title');
        const headerCount = document.getElementById('header-count');
        const headerAvatar = document.getElementById('header-avatar');
        const userSelector = document.getElementById('user-selector');

        let globalMessages = [];
        let mediaVault = {}; // Stores temporary links to media files

        chatWorker.onmessage = function(event) {
            globalMessages = event.data;
            if (globalMessages.length === 0) {
                statusDiv.innerText = "Error: Could not parse messages.";
                return;
            }

            // Extract all unique participants
            const uniqueAuthors = [...new Set(globalMessages.map(m => m.author))];
            
            // Auto-detect phone owner
            let primaryUser = uniqueAuthors.find(a => a.includes("Liang Yong Ket")) || uniqueAuthors[1] || uniqueAuthors[0];

            // Populate the dropdown selector
            userSelector.innerHTML = "";
            uniqueAuthors.forEach(author => {
                const opt = document.createElement('option');
                opt.value = author;
                opt.innerText = author;
                if (author === primaryUser) opt.selected = true;
                userSelector.appendChild(opt);
            });

            // Listen for user changing the perspective
            userSelector.addEventListener('change', (e) => {
                renderChat(e.target.value);
            });

            // Initial render
            renderChat(primaryUser);
            
            setupView.style.display = 'none';
            appView.style.display = 'flex';
        };

        function renderChat(myUsername) {
            chatBody.innerHTML = "";
            let lastDateStr = "";

            // Update Header to show the OTHER person's name
            const otherUsers = [...new Set(globalMessages.map(m => m.author))].filter(a => a !== myUsername);
            headerTitle.innerText = otherUsers.length > 0 ? otherUsers.join(", ") : "Saved Notes";
            headerAvatar.innerText = otherUsers.length > 0 ? otherUsers[0].substring(0, 2).toUpperCase() : "ME";
            headerCount.innerText = `${globalMessages.length} messages loaded`;

            globalMessages.forEach(msg => {
                // 1. Add System Date Badges
                if (msg.date !== lastDateStr) {
                    const dateBadge = document.createElement('div');
                    dateBadge.className = 'system-badge';
                    dateBadge.innerText = msg.date;
                    chatBody.appendChild(dateBadge);
                    lastDateStr = msg.date;
                }
            
                // 2. Escape HTML brackets so the browser doesn't hide <attached: file>
                // We split by <br> first so we don't break our multi-line paragraphs!
                let safeTextParts = msg.text.split('<br>').map(part => {
                    return part.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                });
                let displayContent = safeTextParts.join('<br>');
            
                // 3. Check for uploaded media
                // 3. Check for uploaded media
                for (const [filename, blobUrl] of Object.entries(mediaVault)) {
                    if (displayContent.includes(filename)) {
                        const lowerFile = filename.toLowerCase();
                        
                        // Generate the correct HTML element based on the file type
                        let mediaElement = "";
            
                        if (lowerFile.endsWith('.opus') || lowerFile.endsWith('.m4a')) {
                            mediaElement = `
                                <div style="margin-bottom: 6px; font-weight: bold; color: var(--wa-header);">🎵 Voice Note</div>
                                <audio controls style="max-width: 250px; height: 40px; outline: none;">
                                    <source src="${blobUrl}">
                                    Your browser does not support audio.
                                </audio>
                            `;
                        } 
                        else if (lowerFile.endsWith('.jpg') || lowerFile.endsWith('.jpeg') || lowerFile.endsWith('.png')) {
                            mediaElement = `<img src="${blobUrl}" style="max-width: 100%; max-height: 350px; border-radius: 8px; display: block; margin: 4px 0;">`;
                        } 
                        else if (lowerFile.endsWith('.mp4')) {
                            mediaElement = `
                                <div style="margin-bottom: 6px; font-weight: bold; color: var(--wa-header);">🎥 Video</div>
                                <video controls src="${blobUrl}" style="max-width: 100%; max-height: 350px; border-radius: 8px; display: block; margin: 4px 0;"></video>
                            `;
                        }
            
                        // Replace the <attached: filename> text with the actual media player/image
                        // We use a regular expression to find the specific attached tag and swap it out
                        const attachmentRegex = new RegExp(`&lt;attached:.*?${filename}.*?&gt;`, 'g');
                        displayContent = displayContent.replace(attachmentRegex, mediaElement);
                    }
                }
            
                // 4. Build the Chat Bubble
                const isOutgoing = msg.author === myUsername;
                const msgBubble = document.createElement('div');
                msgBubble.className = `msg-container ${isOutgoing ? 'msg-outgoing' : 'msg-incoming'}`;
            
                msgBubble.innerHTML = `
                    <div class="msg-author">${msg.author}</div>
                    <div class="msg-text">${displayContent}</div>
                    <div class="msg-meta">${msg.time}</div>
                `;
            
                chatBody.appendChild(msgBubble);
            });
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
          const files = Array.from(e.target.files);
          if (files.length === 0) return;
      
          let chatFile = null;
          mediaVault = {}; // Reset the vault on new upload
      
          // Sort the text file from the media files
          files.forEach(file => {
              if (file.name.endsWith('.txt')) {
                  chatFile = file;
              } else {
                  // Create a temporary browser link for the audio/media file
                  mediaVault[file.name] = URL.createObjectURL(file);
              }
          });
      
          if (!chatFile) {
              statusDiv.innerText = "Error: Please make sure to include the _chat.txt file!";
              return;
          }
      
          statusDiv.innerText = "Processing files via Web Worker thread...";
      
          const reader = new FileReader();
          reader.onload = function(event) {
              chatWorker.postMessage(event.target.result);
          };
          reader.readAsText(chatFile);
      });
    </script>
</body>
</html>
