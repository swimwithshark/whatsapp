<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Local Archive Viewer</title>
    <style>
        /* LIGHT MODE VARIABLES (Default) */
        :root {
            --wa-bg: #efeae2;
            --wa-header: #008069;
            --wa-bubble-in: #ffffff;
            --wa-bubble-out: #d9fdd3;
            --wa-text-main: #111b21;
            --wa-text-meta: #667781;
            --wa-author-color: #53bdeb;
            --wa-system-bg: rgba(255, 255, 255, 0.92);
            --wa-pattern-blend: normal;
        }

        /* DARK MODE VARIABLES */
        body.dark-mode {
            --wa-bg: #0b141a;
            --wa-header: #202c33;
            --wa-bubble-in: #202c33;
            --wa-bubble-out: #005c4b;
            --wa-text-main: #e9edef;
            --wa-text-meta: #8696a0;
            --wa-system-bg: #182229;
            --wa-pattern-blend: multiply;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--wa-text-main);
            transition: background-color 0.3s ease;
        }

        /* Update app background in dark mode */
        body.dark-mode { background-color: #111b21; }

        .setup-container {
            background: var(--wa-bubble-in);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
            color: var(--wa-text-main);
        }

        .setup-container h2 { margin-bottom: 10px; color: var(--wa-header); }
        body.dark-mode .setup-container h2 { color: #00a884; }
        
        .setup-container p { font-size: 0.9rem; color: var(--wa-text-meta); margin-bottom: 20px; }

        .file-label {
            display: inline-block;
            background-color: #008069;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        body.dark-mode .file-label { background-color: #00a884; color: #111b21; }

        #file-input { display: none; }
        #status { margin-top: 15px; font-size: 0.85rem; color: var(--wa-text-meta); }

        .app-shell {
            display: none;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
            background-color: var(--wa-bg);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            flex-direction: column;
        }

        .chat-header {
            background-color: var(--wa-header);
            color: #ffffff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        body.dark-mode .chat-header { color: #e9edef; }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #e9edef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #54656f;
            flex-shrink: 0;
        }

        body.dark-mode .avatar { background-color: #667781; color: #e9edef; }

        .chat-info { flex: 1; min-width: 0; }
        .chat-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-subtitle { font-size: 0.75rem; opacity: 0.85; }

        #search-input {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            font-size: 0.85rem;
            background-color: rgba(255, 255, 255, 0.9);
            color: #111b21;
            outline: none;
            width: 100px;
            transition: width 0.3s ease;
        }

        body.dark-mode #search-input { background-color: #2a3942; color: #e9edef; }
        #search-input:focus { width: 140px; }

        #user-selector {
            padding: 4px 8px;
            border-radius: 6px;
            border: none;
            font-size: 0.8rem;
            background-color: rgba(255,255,255,0.2);
            color: white;
            outline: none;
            cursor: pointer;
            max-width: 80px;
        }
        
        body.dark-mode #user-selector { background-color: #2a3942; color: #e9edef; }
        #user-selector option { color: black; }

        /* --- NEW: Dark Mode Toggle Button --- */
        #theme-toggle {
            background: none;
            border: none;
            color: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
            margin-left: 4px;
        }

        .chat-body {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: var(--wa-bg);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: var(--wa-pattern-blend);
        }

        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-thumb { background-color: rgba(11, 20, 26, 0.2); border-radius: 3px; }
        body.dark-mode .chat-body::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); }

        .system-badge {
            align-self: center;
            background-color: var(--wa-system-bg);
            color: var(--wa-text-meta);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: 0 1px 0.5px rgba(11,20,26,0.13);
            margin: 8px 0;
        }

        .msg-container {
            max-width: 80%;
            padding: 6px 9px 8px 9px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
            box-shadow: 0 1px 0.5px rgba(11,20,26,0.13);
            display: flex;
            flex-direction: column;
            word-break: break-word;
        }

        .msg-incoming { align-self: flex-start; background-color: var(--wa-bubble-in); border-top-left-radius: 0; }
        .msg-outgoing { align-self: flex-end; background-color: var(--wa-bubble-out); border-top-right-radius: 0; }

        .msg-author { font-weight: 600; font-size: 0.8rem; color: var(--wa-author-color); margin-bottom: 3px; }
        .msg-outgoing .msg-author { display: none; }
        .msg-text { color: var(--wa-text-main); }
        .msg-meta { font-size: 0.65rem; color: var(--wa-text-meta); align-self: flex-end; margin-top: 4px; margin-left: 20px; margin-bottom: -4px; }

        /* Custom File Fallback Styling */
        .file-fallback {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 8px;
            margin: 4px 0;
            border: 1px solid rgba(0,0,0,0.1);
        }
        body.dark-mode .file-fallback {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="setup-container" id="setup-view">
        <h2>WhatsApp Viewer</h2>
        <p>Select your entire exported WhatsApp <b>Folder</b> to load the chat and all media simultaneously.</p>
        <label for="file-input" class="file-label">Choose Folder</label>
        <input type="file" id="file-input" webkitdirectory multiple>
        <div id="status">Waiting for folder...</div>
    </div>

    <div class="app-shell" id="app-view">
        <div class="chat-header">
            <div class="avatar" id="header-avatar">WA</div>
            <div class="chat-info">
                <div class="chat-title" id="header-title">WhatsApp Archive</div>
                <div class="chat-subtitle" id="header-count">0 messages loaded</div>
            </div>
            
            <input type="text" id="search-input" placeholder="🔍 Search...">
            <select id="user-selector" title="Select 'Me'"></select>
            <button id="theme-toggle" title="Toggle Dark Mode">🌙</button>
        </div>
        <div class="chat-body" id="chat-body"></div>
    </div>

    <script>
        const chatWorker = new Worker('worker.js');
        const setupView = document.getElementById('setup-view');
        const appView = document.getElementById('app-view');
        const statusDiv = document.getElementById('status');
        const chatBody = document.getElementById('chat-body');
        const headerTitle = document.getElementById('header-title');
        const headerCount = document.getElementById('header-count');
        const headerAvatar = document.getElementById('header-avatar');
        const userSelector = document.getElementById('user-selector');
        const searchInput = document.getElementById('search-input');
        const themeToggle = document.getElementById('theme-toggle');

        let globalMessages = [];
        let filteredMessages = []; 
        let mediaVault = {};
        let displayLimit = 100; 
        let currentActiveUser = ""; 

        // --- Dark Mode Logic ---
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            themeToggle.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });

        // 1. Receive data from Web Worker
        chatWorker.onmessage = function(event) {
            globalMessages = event.data;
            filteredMessages = globalMessages;

            if (globalMessages.length === 0) {
                statusDiv.innerText = "Error: Could not parse messages.";
                return;
            }

            const uniqueAuthors = [...new Set(globalMessages.map(m => m.author))];
            currentActiveUser = uniqueAuthors.find(a => a.includes("Liang Yong Ket")) || uniqueAuthors[1] || uniqueAuthors[0];

            userSelector.innerHTML = "";
            uniqueAuthors.forEach(author => {
                const opt = document.createElement('option');
                opt.value = author;
                opt.innerText = author;
                if (author === currentActiveUser) opt.selected = true;
                userSelector.appendChild(opt);
            });

            userSelector.addEventListener('change', (e) => {
                currentActiveUser = e.target.value;
                displayLimit = 100; 
                renderChat(currentActiveUser);
            });

            renderChat(currentActiveUser);
            
            setupView.style.display = 'none';
            appView.style.display = 'flex';
        };

        // 2. Search Engine Logic
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            if (searchTerm === "") {
                filteredMessages = globalMessages; 
            } else {
                filteredMessages = globalMessages.filter(msg => 
                    msg.text.toLowerCase().includes(searchTerm) || 
                    msg.author.toLowerCase().includes(searchTerm)
                );
            }
            
            displayLimit = 100; 
            renderChat(currentActiveUser);
        });

        // 3. Render Chat UI
        function renderChat(myUsername) {
            const oldScrollHeight = chatBody.scrollHeight;
            const isAtBottom = chatBody.scrollHeight - chatBody.scrollTop <= chatBody.clientHeight + 10;
            
            chatBody.innerHTML = "";
            let lastDateStr = "";

            const otherUsers = [...new Set(globalMessages.map(m => m.author))].filter(a => a !== myUsername);
            headerTitle.innerText = otherUsers.length > 0 ? otherUsers.join(", ") : "Saved Notes";
            headerAvatar.innerText = otherUsers.length > 0 ? otherUsers[0].substring(0, 2).toUpperCase() : "ME";
            
            headerCount.innerText = searchInput.value.trim() !== "" 
                ? `🔍 ${filteredMessages.length} results found` 
                : `${filteredMessages.length} total messages`;

            if (filteredMessages.length > displayLimit) {
                const loadMoreBtn = document.createElement('button');
                loadMoreBtn.innerText = `⬆️ Load Older Messages (${filteredMessages.length - displayLimit} hidden)`;
                loadMoreBtn.style.padding = "8px 16px";
                loadMoreBtn.style.margin = "10px auto";
                loadMoreBtn.style.display = "block";
                loadMoreBtn.style.borderRadius = "20px";
                loadMoreBtn.style.border = "1px solid var(--wa-header)";
                loadMoreBtn.style.backgroundColor = "var(--wa-system-bg)";
                loadMoreBtn.style.cursor = "pointer";
                loadMoreBtn.style.color = "var(--wa-text-main)";
                loadMoreBtn.style.fontWeight = "bold";
                
                loadMoreBtn.onclick = function() {
                    displayLimit += 200; 
                    renderChat(currentActiveUser);
                };
                chatBody.appendChild(loadMoreBtn);
            }

            const messagesToRender = filteredMessages.slice(-displayLimit);

            if (messagesToRender.length === 0) {
                const noRes = document.createElement('div');
                noRes.className = 'system-badge';
                noRes.innerText = "No messages match your search.";
                chatBody.appendChild(noRes);
                return;
            }

            messagesToRender.forEach(msg => {
                if (msg.date !== lastDateStr) {
                    const dateBadge = document.createElement('div');
                    dateBadge.className = 'system-badge';
                    dateBadge.innerText = msg.date;
                    chatBody.appendChild(dateBadge);
                    lastDateStr = msg.date;
                }

                let safeTextParts = msg.text.split('<br>').map(part => {
                    return part.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                });
                let displayContent = safeTextParts.join('<br>');

                // Detect and Render Media (Including Fallbacks and Clickable Docs!)
                for (const [filename, blobUrl] of Object.entries(mediaVault)) {
                    if (displayContent.includes(filename)) {
                        const lowerFile = filename.toLowerCase();
                        let mediaElement = "";

                        if (lowerFile.endsWith('.opus') || lowerFile.endsWith('.m4a')) {
                            mediaElement = `
                                <div style="margin-bottom: 6px; font-weight: bold; opacity: 0.8;">🎵 Voice Note</div>
                                <audio controls style="max-width: 250px; height: 40px; outline: none;">
                                    <source src="${blobUrl}">
                                </audio>
                            `;
                        } else if (lowerFile.endsWith('.jpg') || lowerFile.endsWith('.jpeg') || lowerFile.endsWith('.png') || lowerFile.endsWith('.webp') || lowerFile.endsWith('.gif')) {
                            mediaElement = `<img src="${blobUrl}" style="max-width: 100%; max-height: 350px; border-radius: 8px; display: block; margin: 4px 0; background: transparent;">`;
                        } else if (lowerFile.endsWith('.mp4')) {
                            mediaElement = `
                                <div style="margin-bottom: 6px; font-weight: bold; opacity: 0.8;">🎥 Video</div>
                                <video controls src="${blobUrl}" style="max-width: 100%; max-height: 350px; border-radius: 8px; display: block; margin: 4px 0;"></video>
                            `;
                        } else {
                            mediaElement = `
                                <a href="${blobUrl}" target="_blank" style="text-decoration: none; color: inherit;" title="Click to open file">
                                    <div class="file-fallback" style="cursor: pointer;">
                                        <span style="font-size: 1.5rem;">📄</span>
                                        <div style="display: flex; flex-direction: column;">
                                            <strong style="font-size: 0.8rem; color: var(--wa-author-color);">Click to open file</strong>
                                            <span style="font-size: 0.75rem; opacity: 0.8; word-break: break-all;">${filename}</span>
                                        </div>
                                    </div>
                                </a>
                            `;
                        }

                        const attachmentRegex = new RegExp(`&lt;attached:.*?${filename}.*?&gt;`, 'gi');
                        displayContent = displayContent.replace(attachmentRegex, mediaElement);
                    }
                }

                const isOutgoing = msg.author === myUsername;
                const msgBubble = document.createElement('div');
                msgBubble.className = `msg-container ${isOutgoing ? 'msg-outgoing' : 'msg-incoming'}`;

                msgBubble.innerHTML = `
                    <div class="msg-author">${msg.author}</div>
                    <div class="msg-text">${displayContent}</div>
                    <div class="msg-meta">${msg.time}</div>
                `;

                chatBody.appendChild(msgBubble);
            });

            if (displayLimit === 100 || isAtBottom) {
                chatBody.scrollTop = chatBody.scrollHeight;
            } else {
                chatBody.scrollTop = chatBody.scrollHeight - oldScrollHeight;
            }
        }
        
        // 4. Handle Folder Upload
        document.getElementById('file-input').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            let chatFile = null;
            mediaVault = {}; 

            statusDiv.innerText = "Scanning folder...";

            files.forEach(file => {
                if (file.name.endsWith('.txt')) {
                    chatFile = file;
                } else {
                    mediaVault[file.name] = URL.createObjectURL(file);
                }
            });

            if (!chatFile) {
                statusDiv.innerText = "Error: Could not find the _chat.txt file in this folder!";
                return;
            }

            statusDiv.innerText = "Processing text via background thread...";

            const reader = new FileReader();
            reader.onload = function(event) {
                chatWorker.postMessage(event.target.result);
            };
            reader.readAsText(chatFile);
        });
    </script>
</body>
</html>
